<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/styles.css') }}">
        <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
        <title>Admin — Users</title>
        <style>
            body {
                padding: 20px;
                text-align: left;
            }

            h2 {
                margin-top: 30px;
                margin-bottom: 10px;
            }

            #users-table {
                width: 100%;
                border-collapse: collapse;
                table-layout: fixed;
                margin-top: 10px;
                background: white;
                box-shadow: 0 1px 4px rgba(0,0,0,0.08);
                border-radius: 6px;
                overflow: hidden;
            }

            #users-table colgroup .col-num     { width: 48px; }
            #users-table colgroup .col-addr    { width: 260px; }
            #users-table colgroup .col-updated { width: 160px; }
            #users-table colgroup .col-size    { width: 110px; }
            #users-table colgroup .col-action  { width: 90px; }

            #users-table thead tr {
                background: #f8f9fa;
            }

            #users-table th,
            #users-table td {
                padding: 9px 12px;
                border-bottom: 1px solid #f0f0f0;
                text-align: left;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #users-table th {
                font-size: 12px;
                font-weight: 600;
                color: #555;
                text-transform: uppercase;
                letter-spacing: 0.04em;
            }

            th.sortable {
                cursor: pointer;
                user-select: none;
            }

            th.sortable:hover {
                color: #007bff;
            }

            th.sort-active {
                color: #007bff;
            }

            .sort-icon {
                margin-left: 4px;
                font-size: 10px;
            }

            #users-table td.addr-cell span.addr-text {
                cursor: pointer;
            }

            #users-table td.addr-cell span.addr-text:hover {
                text-decoration: underline dotted #aaa;
            }

            #users-table td.addr-cell {
                font-family: monospace;
                font-size: 13px;
            }

            #users-table tr.wiped {
                opacity: 0.4;
            }

            .badge-unknown {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 11px;
                background-color: #e9ecef;
                color: #888;
            }

            .btn-wipe {
                padding: 4px 12px;
                font-size: 12px;
                border: 1px solid #dc3545;
                color: #dc3545;
                background: white;
                border-radius: 4px;
                cursor: pointer;
                white-space: nowrap;
            }

            .btn-wipe:hover {
                background-color: #dc3545;
                color: white;
            }

            .btn-wipe:disabled {
                border-color: #e9a0a8;
                color: #e9a0a8;
                cursor: default;
            }

            #summary {
                font-size: 13px;
                color: #888;
                margin-bottom: 6px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>
                <a href="{{ url_for('main.index') }}"
                   style="text-decoration:none;
                          color:inherit">DeFi Taxes</a> — Admin
            </h1>
        </div>
        <p>
            <a href="{{ url_for('admin.admin_page') }}">&larr; Queue Monitor</a>
            &nbsp;&nbsp;
            <a href="{{ url_for('admin.api_usage_page') }}">API Usage &rarr;</a>
        </p>
        <h2>Users</h2>
        <div id="summary">Loading…</div>
        <table id="users-table">
            <colgroup>
                <col class="col-num">
                <col class="col-addr">
                <col class="col-updated">
                <col class="col-size">
                <col class="col-action">
            </colgroup>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Address</th>
                    <th class="sortable sort-active" id="th-updated" data-col="last_update">
                        Last Updated <span class="sort-icon">▼</span>
                    </th>
                    <th class="sortable" id="th-size" data-col="folder_size">
                        Folder Size <span class="sort-icon"></span>
                    </th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
            </tbody>
        </table>
        <script>
            var urls = {
                usersList: "{{ url_for('admin.users_list') }}",
                wipe: "{{ url_for('admin.wipe') }}",
                mainIndex: "{{ url_for('main.index') }}"
            };

            var allUsers = [];
            var sortCol = "last_update";
            var sortDir = "desc";

            function fmtAgo(ts) {
                if (ts === null || ts === undefined) {
                    return '<span class="badge-unknown">Unknown</span>';
                }
                var now = Math.floor(Date.now() / 1000);
                var diff = now - ts;
                if (diff < 60) return "just now";
                if (diff < 3600) return Math.floor(diff / 60) + " mins ago";
                if (diff < 86400) return Math.floor(diff / 3600) + " hrs ago";
                if (diff < 86400 * 30) return Math.floor(diff / 86400) + " days ago";
                if (diff < 86400 * 365) return Math.floor(diff / (86400 * 30)) + " months ago";
                return new Date(ts * 1000).toLocaleDateString();
            }

            function fmtSize(bytes) {
                if (bytes === 0) return "0 B";
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
                if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + " MB";
                return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
            }

            function truncAddr(addr) {
                if (!addr || addr.length <= 12) return addr;
                return addr.slice(0, 8) + "\u2026" + addr.slice(-6);
            }

            function sortedUsers() {
                var copy = allUsers.slice();
                copy.sort(function(a, b) {
                    var av = a[sortCol];
                    var bv = b[sortCol];
                    // Nulls always last
                    if (av === null && bv === null) return 0;
                    if (av === null) return 1;
                    if (bv === null) return -1;
                    if (av < bv) return sortDir === "asc" ? -1 : 1;
                    if (av > bv) return sortDir === "asc" ? 1 : -1;
                    return 0;
                });
                return copy;
            }

            function renderTable() {
                var tbody = $("#users-tbody");
                tbody.empty();
                var users = sortedUsers();
                $.each(users, function(i, u) {
                    var addrCell = '<span class="addr-text" title="Click to copy: ' + u.address + '" onclick="copyAddr(this, \'' + u.address + '\')">'
                        + truncAddr(u.address) + '</span>';
                    var updatedTd = $('<td>').html(fmtAgo(u.last_update));
                    if (u.last_update !== null && u.last_update !== undefined) {
                        updatedTd.attr('title', new Date(u.last_update * 1000).toLocaleString());
                    }
                    var row = $('<tr data-address="' + u.address + '">').append(
                        $('<td>').text(i + 1),
                        $('<td class="addr-cell">').html(addrCell),
                        updatedTd,
                        $('<td>').text(fmtSize(u.folder_size)),
                        $('<td>').html('<button class="btn-wipe" onclick="wipeAddress(\'' + u.address + '\', this)">Wipe</button>')
                    );
                    tbody.append(row);
                });
            }

            function updateSortHeaders() {
                $("th.sortable").each(function() {
                    var col = $(this).data("col");
                    var icon = $(this).find(".sort-icon");
                    if (col === sortCol) {
                        $(this).addClass("sort-active");
                        icon.text(sortDir === "desc" ? "▼" : "▲");
                    } else {
                        $(this).removeClass("sort-active");
                        icon.text("");
                    }
                });
            }

            function wipeAddress(address, btn) {
                if (!confirm("Wipe all transactions for " + address + "?\n\nThis cannot be undone.")) {
                    return;
                }
                $(btn).prop("disabled", true).text("Wiping…");
                $.get(urls.wipe, { address: address }, function(data) {
                    var result = typeof data === "string" ? JSON.parse(data) : data;
                    if (result.success) {
                        $('tr[data-address="' + address + '"]').addClass("wiped");
                        $(btn).text("Wiped");
                    } else {
                        alert("Wipe failed: " + (result.error || "unknown error"));
                        $(btn).prop("disabled", false).text("Wipe");
                    }
                }).fail(function() {
                    alert("Request failed — could not wipe address.");
                    $(btn).prop("disabled", false).text("Wipe");
                });
            }

            function copyAddr(el, address) {
                navigator.clipboard.writeText(address).then(function() {
                    var orig = el.title;
                    el.title = "Copied!";
                    var origText = el.textContent;
                    el.textContent = "Copied!";
                    setTimeout(function() {
                        el.textContent = origText;
                        el.title = orig;
                    }, 1200);
                });
            }

            $(document).ready(function() {
                $.getJSON(urls.usersList, function(data) {
                    if (data.error) {
                        $("#summary").text("Error: " + data.error);
                        return;
                    }
                    allUsers = data.users;
                    var known = allUsers.filter(function(u) { return u.last_update !== null; }).length;
                    $("#summary").text(allUsers.length + " users (" + known + " with activity)");
                    renderTable();
                }).fail(function() {
                    $("#summary").text("Failed to load users.");
                });

                $("th.sortable").on("click", function() {
                    var col = $(this).data("col");
                    if (col === sortCol) {
                        sortDir = sortDir === "desc" ? "asc" : "desc";
                    } else {
                        sortCol = col;
                        sortDir = "desc";
                    }
                    updateSortHeaders();
                    renderTable();
                });
            });
        </script>
    </body>
</html>
